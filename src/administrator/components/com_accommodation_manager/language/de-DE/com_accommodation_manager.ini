COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_SLIDER_SETTINGS="Galerie-Slider Einstellungen"
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_SLIDER_SETTINGS_DESC="Diese Einstellungen steuern das Swiper.js-Galerie-Karussell für Zimmerbilder. Sie gelten für die Zimmerliste und die Zimmerdetailansicht."
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_LOAD_CSS_DESC="Lädt das Komponenten-Galerie-Slider-Stylesheet (gallery-slider.css). Das Swiper-Core-CSS wird immer geladen. Deaktivieren, wenn das Template eigene Galerie-Styles bereitstellt."
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_LOAD_JS_DESC="Lädt das Komponenten-Galerie-Slider-Skript (gallery-slider.js), das Swiper automatisch initialisiert. Deaktivieren, wenn das Template ein eigenes Initialisierungsskript bereitstellt."
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_CSS_VARS_DESC="Überschreiben Sie diese CSS Custom Properties in Ihrem Template, um das Galerie-Slider-Aussehen anzupassen:<br><code>--am-gallery-height</code>: 400px<br><code>--am-gallery-border-radius</code>: 0<br><code>--am-gallery-nav-color</code>: #fff<br><code>--am-gallery-pagination-color</code>: #fff"
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_JS_EVENT_DESC="Das Komponenten-Skript löst ein <code>am-gallery-before-init</code>-Event auf jedem Galerie-Container aus, bevor Swiper initialisiert wird. Hören Sie auf dieses Event in Ihrem Template-JS, um die Swiper-Optionen anzupassen, ohne das Komponenten-Skript zu deaktivieren:<br><br><code>document.addEventListener('am-gallery-before-init', function(e) {<br>&nbsp;&nbsp;e.detail.options.effect = 'fade';<br>&nbsp;&nbsp;e.detail.options.speed = 600;<br>});</code>"
