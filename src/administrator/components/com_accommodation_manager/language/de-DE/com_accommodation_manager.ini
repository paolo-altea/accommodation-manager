COM_ACCOMMODATION_MANAGER_CONFIG_SLIDER_CSS_VARS="CSS Custom Properties"
COM_ACCOMMODATION_MANAGER_CONFIG_SLIDER_CSS_VARS_DESC="Überschreiben Sie diese CSS Custom Properties in Ihrem Template, um das Slider-Aussehen anzupassen:<br><code>--am-slider-height</code>: 70vh<br><code>--am-slider-overlay-bg</code>: linear-gradient(transparent 40%, rgba(0,0,0,.7))<br><code>--am-slider-overlay-padding</code>: 2rem<br><code>--am-slider-title-color</code>: #fff<br><code>--am-slider-title-size</code>: 2.5rem<br><code>--am-slider-text-color</code>: #fff<br><code>--am-slider-btn-bg</code>: var(--am-slider-title-color)<br><code>--am-slider-btn-color</code>: #000<br><code>--am-slider-nav-color</code>: #fff<br><code>--am-slider-pagination-color</code>: #fff"
COM_ACCOMMODATION_MANAGER_CONFIG_SLIDER_JS_EVENT="JavaScript Custom Event"
COM_ACCOMMODATION_MANAGER_CONFIG_SLIDER_JS_EVENT_DESC="Das Komponenten-Skript löst ein <code>am-slider-before-init</code>-Event auf dem Slider-Container aus, bevor Swiper initialisiert wird. Hören Sie auf dieses Event in Ihrem Template-JS, um die Swiper-Optionen anzupassen, ohne das Komponenten-Skript zu deaktivieren:<br><br><code>document.addEventListener('am-slider-before-init', function(e) {<br>&nbsp;&nbsp;e.detail.options.effect = 'fade';<br>&nbsp;&nbsp;e.detail.options.speed = 800;<br>});</code>"

