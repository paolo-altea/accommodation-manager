COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_LOAD_CSS_DESC="Carica il foglio di stile slider galleria del componente (gallery-slider.css). Il CSS core di Swiper viene sempre caricato. Disabilitare se il template fornisce i propri stili galleria."
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_LOAD_JS_DESC="Carica lo script slider galleria del componente (gallery-slider.js) che inizializza Swiper automaticamente. Disabilitare se il template fornisce il proprio script di inizializzazione."
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_CSS_VARS_DESC="Sovrascrivi queste CSS custom properties nel tuo template per personalizzare l'aspetto dello slider galleria:<br><code>--am-gallery-height</code>: 400px<br><code>--am-gallery-border-radius</code>: 0<br><code>--am-gallery-nav-color</code>: #fff<br><code>--am-gallery-pagination-color</code>: #fff"
COM_ACCOMMODATION_MANAGER_CONFIG_GALLERY_JS_EVENT_DESC="Lo script del componente emette un evento <code>am-gallery-before-init</code> su ogni container galleria prima che Swiper venga inizializzato. Ascolta questo evento nel JS del tuo template per modificare le opzioni di Swiper senza disabilitare lo script del componente:<br><br><code>document.addEventListener('am-gallery-before-init', function(e) {<br>&nbsp;&nbsp;e.detail.options.effect = 'fade';<br>&nbsp;&nbsp;e.detail.options.speed = 600;<br>});</code>"
